services:
  backend:
    build: ./backend
    container_name: mitiga-backend
    restart: unless-stopped
    network_mode: host
    env_file: .env
    environment:
      - PORT=8091
      - GIN_MODE=release
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8091/api/tags", "||", "true"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build: ./frontend
    container_name: mitiga-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - backend
