services:
  backend:
    build: ./backend
    container_name: mitiga-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8091}:8091"
    env_file: .env
    environment:
      - PORT=8091
      - GIN_MODE=release
    networks:
      - mitiga
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8091/api/tags", "||", "true"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build: ./frontend
    container_name: mitiga-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend
    networks:
      - mitiga

networks:
  mitiga:
    driver: bridge
