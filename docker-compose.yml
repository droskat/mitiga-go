services:
  backend:
    build: ./backend
    container_name: mitiga-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8091}:8091"
    environment:
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT:-3306}
      - DB_NAME=${DB_NAME:-Test}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ORIGINS=${CORS_ORIGINS}
      - PORT=8091
      - GIN_MODE=release
    networks:
      - mitiga
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8091/api/tags", "||", "true"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build: ./frontend
    container_name: mitiga-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    environment:
      - BACKEND_PORT=${BACKEND_PORT:-8091}
      - BACKEND_HOST=mitiga-backend
    depends_on:
      - backend
    networks:
      - mitiga

networks:
  mitiga:
    driver: bridge
